<header class="w-full top-0 sticky z-50 bg-[#f1f3fe] dark:bg-slate-900">
<div class="flex justify-between items-center px-6 py-4 w-full max-w-xl mx-auto">

<!-- Main Content Canvas -->
<main class="max-w-xl mx-auto px-6 pt-12">
<!-- Editorial Headline Section -->
<section class="mb-12">
<span class="font-label text-primary font-semibold tracking-wider uppercase text-xs mb-2 block">New Entry</span>
<h2 class="font-headline text-[2.75rem] font-extrabold leading-tight tracking-tight text-on-surface">Add your medication</h2>
<p class="text-on-surface-variant text-lg mt-4 font-body leading-relaxed">Let's set up your new restorative routine with precision and care.</p>
</section>
<!-- Form Section with Tonal Layering -->
<div class="space-y-8">
<!-- Step 1: Identification -->
<div class="bg-surface-container-low p-8 rounded-xl">
<div class="flex items-center gap-3 mb-6">
<div class="w-8 h-8 rounded-full custom-gradient flex items-center justify-center text-white font-bold text-sm">1</div>
<h3 class="font-headline text-xl font-semibold">Identification</h3>
</div>
<div class="space-y-6">
<div class="group">
<label class="block text-sm font-semibold text-on-surface-variant mb-2 ml-1">Medication Name</label>
<input class="w-full px-5 py-4 bg-surface-container-high rounded-xl border-none focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 font-body text-on-surface placeholder:text-outline-variant" placeholder="e.g. Vitamin D3, Lipitor" type="text"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="group">
<label class="block text-sm font-semibold text-on-surface-variant mb-2 ml-1">Dosage Amount</label>
<input class="w-full px-5 py-4 bg-surface-container-high rounded-xl border-none focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 font-body text-on-surface placeholder:text-outline-variant" placeholder="50" type="number"/>
</div>
<div class="group">
<label class="block text-sm font-semibold text-on-surface-variant mb-2 ml-1">Unit</label>
<select class="w-full px-5 py-4 bg-surface-container-high rounded-xl border-none focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 font-body text-on-surface">
<option>mg</option>
<option>ml</option>
<option>mcg</option>
<option>pills</option>
<option>drops</option>
</select>
</div>
</div>
</div>
</div>
<!-- Step 2: Scheduling -->
<div class="bg-surface-container-low p-8 rounded-xl">
<div class="flex items-center gap-3 mb-6">
<div class="w-8 h-8 rounded-full custom-gradient flex items-center justify-center text-white font-bold text-sm">2</div>
<h3 class="font-headline text-xl font-semibold">Scheduling</h3>
</div>
<div class="space-y-6">
<div>
<label class="block text-sm font-semibold text-on-surface-variant mb-4 ml-1">Frequency</label>
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-center gap-2 px-4 py-4 rounded-full border-2 border-primary text-primary font-semibold bg-primary/5 transition-all">
<span class="material-symbols-outlined text-xl">event_repeat</span>
                                Daily
                            </button>
<button class="flex items-center justify-center gap-2 px-4 py-4 rounded-full border-2 border-transparent bg-surface-container-highest text-on-surface-variant font-semibold hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined text-xl">calendar_month</span>
                                Specific Days
                            </button>
</div>
</div>
<div>
<label class="block text-sm font-semibold text-on-surface-variant mb-4 ml-1">Time of Day</label>
<div class="grid grid-cols-4 gap-2">
<button class="flex flex-col items-center justify-center py-4 rounded-xl bg-surface-container-lowest border-2 border-transparent hover:border-primary/30 transition-all gap-2">
<span class="material-symbols-outlined text-secondary">wb_sunny</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Morning</span>
</button>
<button class="flex flex-col items-center justify-center py-4 rounded-xl bg-surface-container-lowest border-2 border-primary transition-all gap-2 shadow-sm">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">light_mode</span>
<span class="text-[10px] font-bold uppercase tracking-wider text-primary">Noon</span>
</button>
<button class="flex flex-col items-center justify-center py-4 rounded-xl bg-surface-container-lowest border-2 border-transparent hover:border-primary/30 transition-all gap-2">
<span class="material-symbols-outlined text-secondary">wb_twilight</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Evening</span>
</button>
<button class="flex flex-col items-center justify-center py-4 rounded-xl bg-surface-container-lowest border-2 border-transparent hover:border-primary/30 transition-all gap-2">
<span class="material-symbols-outlined text-secondary">bedtime</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Night</span>
</button>
</div>
</div>
</div>
</div>
<!-- Editorial Feature: Context Note -->
<div class="bg-surface-container-lowest p-8 rounded-xl shadow-[0_8px_32px_rgba(24,28,35,0.04)]">
<div class="flex items-start gap-4">
<div class="p-3 rounded-full bg-tertiary/10 text-tertiary">
<span class="material-symbols-outlined">notes</span>
</div>
<div class="flex-1">
<label class="block text-sm font-semibold text-on-surface-variant mb-2">Instructions (Optional)</label>
<textarea class="w-full p-0 bg-transparent border-none focus:ring-0 text-on-surface font-body placeholder:text-outline-variant resize-none" placeholder="e.g. Take with food, avoid caffeine..." rows="3"></textarea>
</div>
</div>
</div>

<div class="pt-8 pb-12">
<button class="w-full custom-gradient text-white font-headline font-bold py-5 rounded-full text-lg shadow-[0_12px_40px_rgba(0,88,188,0.25)] hover:brightness-110 active:scale-[0.98] transition-all duration-200">
                    Save Medication
                </button>
<button class="w-full mt-4 text-on-surface-variant font-semibold py-4 hover:text-primary transition-colors">
                    Discard Draft
                </button>
</div>
</div>
</main>

<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-white/85 dark:bg-slate-900/85 backdrop-blur-xl rounded-t-[24px] shadow-[0_-8px_32px_rgba(24,28,35,0.06)]">

<span class="material-symbols-outlined">grid_view</span>
